workflows:
  android-release:
    name: War Gold Scanner Android Build
    max_build_duration: 30
    environment:
      java: 17
    scripts:
      - name: Install Gradle 8.7
        script: |
          wget -q https://services.gradle.org/distributions/gradle-8.7-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /opt
          export PATH=/opt/gradle-8.7/bin:$PATH
          gradle --version

      - name: Build Android APK (Debug)
        script: |
          export PATH=/opt/gradle-8.7/bin:$PATH
          gradle assembleDebug 2>&1 | tee build_output.txt
          BUILD_EXIT=${PIPESTATUS[0]}
          echo ""
          echo "=== ERROR SUMMARY ==="
          grep -E "Caused by:|> Could not|error:|minSdk|minCompile|Failed to|FAILED" build_output.txt | head -30
          echo "=== APK FILES ==="
          find . -name "*.apk" -type f 2>/dev/null || echo "none"
          exit $BUILD_EXIT

    artifacts:
      - build_output.txt
      - "**/*.apk"
