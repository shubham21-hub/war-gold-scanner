workflows:
  android-release:
    name: War Gold Scanner Android Build
    max_build_duration: 30
    environment:
      java: 17
    scripts:
      - name: Install Gradle 8.7
        script: |
          wget -q https://services.gradle.org/distributions/gradle-8.7-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /opt
          export PATH=/opt/gradle-8.7/bin:$PATH
          gradle --version

      - name: Build Android APK (Debug)
        script: |
          export PATH=/opt/gradle-8.7/bin:$PATH
          gradle :app:checkDebugAarMetadata --stacktrace 2>&1 | tail -60
          gradle assembleDebug --stacktrace 2>&1 | grep -E "error:|FAILED|Exception|e: |> " | head -50

      - name: List APK output
        script: |
          find . -name "*.apk" 2>/dev/null || echo "No APK found"

    artifacts:
      - "**/*.apk"
