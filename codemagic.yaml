workflows:
  android-release:
    name: War Gold Scanner Android Build
    max_build_duration: 30
    environment:
      java: 17
    scripts:
      - name: Install Gradle 8.9
        script: |
          curl -L https://services.gradle.org/distributions/gradle-8.9-bin.zip -o /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /tmp/
          export PATH="/tmp/gradle-8.9/bin:$PATH"
          gradle --version
      - name: Build Android APK (Debug)
        script: |
          export PATH="/tmp/gradle-8.9/bin:$PATH"
          gradle assembleDebug --stacktrace --info 2>&1 | tail -80
    artifacts:
      - app/build/outputs/**/*.apk
